name: dco

on:
  pull_request:
    branches: [main]

jobs:
  check-signoff:
    name: check DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify every commit is signed off
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          echo "Range: $base..$head"

          missing=$(git log --format='%H %s' "$base".."$head" --no-merges | while read -r sha subject; do
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "$sha $subject"
            fi
          done)

          if [ -n "$missing" ]; then
            echo "::error::The following commits are missing DCO sign-off (add with git commit -s):"
            echo "$missing"
            exit 1
          fi
          echo "All commits carry DCO sign-off."
