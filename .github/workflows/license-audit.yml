name: license-audit

on:
  push:
    branches: [main]
    paths:
      - "apps/api/pyproject.toml"
      - "apps/api/uv.lock"
      - "**/package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/license-audit.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/pyproject.toml"
      - "apps/api/uv.lock"
      - "**/package.json"
      - "pnpm-lock.yaml"
  schedule:
    # Weekly rescan catches transitive license changes.
    - cron: "0 8 * * 1"

jobs:
  python:
    name: python (pip-licenses)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Sync
        run: uv sync --project apps/api --extra dev --frozen

      - name: pip-licenses
        # --partial-match tolerates the inconsistent free-form license strings in
        # PyPI metadata ("MIT License", "Apache-2.0 AND MIT", "Mozilla Public
        # License 2.0 (MPL 2.0)"): an allowed token matches when it is a substring
        # of the package's license. The allow-list stays permissive/weak-copyleft
        # only (MIT/BSD/Apache/ISC/MPL/LGPL/PSF/Unlicense + AGPL) — no bare GPL or
        # proprietary passes, so §1.7 (AGPL-compatibility) still holds. tiktoken is
        # ignored: it dumps the full MIT license *body* (no parseable token) into
        # its metadata; it is MIT (OpenAI).
        run: |
          uv run --project apps/api pip install pip-licenses
          uv run --project apps/api pip-licenses \
            --partial-match \
            --format=markdown \
            --with-authors \
            --with-urls \
            --allow-only='MIT;BSD;Apache;ISC;MPL-2.0;MPL 2.0;Mozilla Public License;Python Software Foundation;PSF-2.0;Unlicense;LGPL;Lesser General Public License;AGPL;Public Domain;CC0' \
            --ignore-packages krititva-api tiktoken

  javascript:
    name: javascript (license-checker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4
        with:
          version: "9"

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: license-checker
        run: |
          pnpm dlx license-checker \
            --production \
            --onlyAllow "MIT;BSD;BSD-2-Clause;BSD-3-Clause;Apache-2.0;ISC;MPL-2.0;LGPL-3.0-or-later;AGPL-3.0-only;CC0-1.0;Unlicense;0BSD;Python-2.0" \
            --excludePackages "@krititva/web;@krititva/api-client;krititva"
