# Reference reverse-proxy config for self-hosters. Copy and adapt.
# Note: X-Accel-Buffering: no is critical for SSE (FR-4.6.8).

upstream krititva_api {
    server api:8000;
}

upstream krititva_web {
    server web:3000;
}

server {
    listen 80;
    server_name krititva.local;

    # Static frontend
    location / {
        proxy_pass http://krititva_web;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # API
    location /api/ {
        proxy_pass http://krititva_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SSE — disable buffering, keep the connection open.
    location ~ ^/api/v1/projects/.+/artifacts/jobs/.+/events$ {
        proxy_pass http://krititva_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        add_header X-Accel-Buffering no;
    }

    # Public signed-link surface
    location /public/ {
        proxy_pass http://krititva_api;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
